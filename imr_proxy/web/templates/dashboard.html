{% extends "base.html" %}{% block content %}<h2>Live traffic</h2><input id="filter" placeholder="Filter traffic"><table id="flows"><thead><tr><th>Time</th><th>Method</th><th>URL</th><th>Status</th><th>Duration</th><th>Severity</th></tr></thead><tbody>{% for f in flows %}<tr><td>{{ f.started_at }}</td><td>{{ f.method }}</td><td><a href="/flows/{{ f.id }}">{{ f.url }}</a></td><td>{{ f.status_code or '' }}</td><td>{{ "%.1f"|format(f.duration_ms or 0) }} ms</td><td class="sev {{ f.highest_severity }}">{{ f.highest_severity }}</td></tr>{% endfor %}</tbody></table>{% endblock %}
